name: PR Autolabeler

permissions:
  contents: read
  pull-requests: write

on:
  # pull_request_target is required for autolabeler to label PRs from forks.
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  draft-release:
    uses: commit-check/.github/.github/workflows/pr-labeler.yml@main
